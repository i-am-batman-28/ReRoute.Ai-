services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reroute
      POSTGRES_PASSWORD: reroute_dev
      POSTGRES_DB: reroute
    # 5433 avoids clashing with a local Homebrew/other Postgres on 5432
    ports:
      - "5433:5432"
    volumes:
      - reroute_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reroute -d reroute"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  reroute_pgdata:

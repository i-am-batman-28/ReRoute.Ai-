# Optional Semgrep pack — DAO layer checks (project-local BaseDAO).
rules:
  - id: dao-must-inherit-basedao
    languages: [python]
    severity: ERROR
    message: >
      DAO classes should inherit from your in-repo BaseDAO (or documented alternative).
    patterns:
      - pattern: |
          class $DAO(...):
            ...
      - pattern-not-inside: |
          class $DAO(BaseDAO):
            ...
      - pattern-not-inside: |
          class $DAO(BaseDAO[$M]):
            ...
    paths:
      include:
        - "**/dao.py"
        - "**/dao/*.py"
        - "**/*_dao.py"

  - id: dao-class-outside-allowed-path
    languages: [python]
    severity: ERROR
    message: >
      DAO classes should live under dao/ or in *_dao.py files only.
    pattern-either:
      - pattern: |
          class $DAO(BaseDAO[$MODEL]):
            ...
      - pattern: |
          class $DAO(BaseDAO):
            ...
    paths:
      exclude:
        - "**/dao.py"
        - "**/dao/*.py"
        - "**/*_dao.py"

  - id: dao-init-must-call-super
    languages: [python]
    severity: ERROR
    message: >
      DAO __init__ should call super().__init__(Model, session) when using BaseDAO.
    patterns:
      - pattern: |
          class $DAO(BaseDAO[$MODEL]):
            ...
      - pattern-not-inside: |
          class $DAO(BaseDAO[$MODEL]):
            def __init__(self, $SESSION: AsyncSession):
              super().__init__($MODEL, $SESSION)
    paths:
      include:
        - "**/dao.py"
        - "**/dao/*.py"
        - "**/*_dao.py"

  - id: no-exception-handling-in-dao
    languages: [python]
    severity: ERROR
    message: >
      DAOs must not wrap DB calls in try/except — let errors propagate to the service layer.
    patterns:
      - pattern: |
          try:
            ...
          except ...:
            ...
    paths:
      include:
        - "**/dao.py"
        - "**/dao/*.py"
        - "**/*_dao.py"

  - id: dao-class-name-must-end-with-dao
    languages: [python]
    severity: ERROR
    message: >
      DAO class names must end with 'DAO'.
    patterns:
      - pattern-either:
          - pattern: |
              class $NAME(BaseDAO[$MODEL]):
                ...
          - pattern: |
              class $NAME(BaseDAO):
                ...
      - metavariable-regex:
          metavariable: $NAME
          regex: ^(?!.*DAO$).+$
    paths:
      include:
        - "**/dao.py"
        - "**/dao/*.py"
        - "**/*_dao.py"

# Optional Semgrep pack — tune paths/patterns to your repo.
rules:
  - id: fastapi-route-missing-auth
    languages: [python]
    severity: WARNING
    message: >
      Route may be missing authentication. For protected APIs use Depends(get_current_user)
      or your project's auth dependency (Annotated[..., Depends(...)]). Public routes
      (health, openapi) should be rare and documented — add # nosemgrep if intentional.

    patterns:
      - pattern-inside: |
          @router.$METHOD(...)
          async def $FUNC(...):
            ...
      - pattern-not:
          pattern-either:
            - pattern: |
                @router.$METHOD(...)
                async def $FUNC(..., $AUTH: Annotated[$T, Depends(get_current_user)], ...):
                  ...
            - pattern: |
                @router.$METHOD(...)
                async def $FUNC(..., $AUTH: Annotated[$T, Depends($ANY)], ...):
                  ...
            - pattern: |
                @router.$METHOD(...)
                async def $FUNC(..., $DEP = Depends($ANY), ...):
                  ...

  - id: fastapi-router-missing-response-model
    message: >
      Prefer defining response_model on routes for a stable API contract
      (e.g. BaseResponse[YourSchema] or a concrete Pydantic model).
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-inside: |
          @router.$METHOD(...)
      - pattern-not:
          pattern-either:
            - pattern: |
                @router.$METHOD(..., response_model=$M, ...)
            - pattern: |
                @router.$METHOD(..., response_model=None, ...)

    metadata:
      category: correctness
      confidence: medium

  - id: fastapi-router-no-exception-handling
    message: >
      Avoid try/except in routers — handle errors in services and global exception handlers.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-inside: |
          @router.$METHOD(...)
          async def $FUNC(...):
            ...
      - pattern: |
          try:
              ...
          except ...:
              ...
    metadata:
      category: architecture
      confidence: high

  - id: fastapi-router-direct-db-access
    message: >
      Routers must not run database queries directly — delegate to service → DAO.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-inside: |
          @router.$METHOD(...)
          async def $FUNC(...):
            ...
      - pattern-either:
          - pattern: $SESSION.execute(...)
          - pattern: $SESSION.scalars(...)
          - pattern: select(...)
    metadata:
      category: architecture
      confidence: medium
